name: Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: echo "Linting..."

      - name: Test
        run: echo "Testing..."

      - name: Coverage
        run: echo "Checking coverage..."
