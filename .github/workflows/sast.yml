name: Security (SAST)
on:
  push:
    branches: [main, develop]
  pull_request:
  schedule: [{cron: "0 2 * * *"}]
permissions:
  contents: read

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: github/codeql-action/init-action@v4
        with:
          languages: [typescript, python, rust, go]
      - uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # was: no ref (default branch)
      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # was: no ref (default branch)