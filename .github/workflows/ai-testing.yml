name: Testing Infrastructure

on:
  push:
    branches: [main, docs]
    paths:
      - 'tests/**'
      - 'vitest.config.ts'
      - 'playwright.config.ts'
      - '**.rs'
  pull_request:
    paths:
      - 'tests/**'
      - 'vitest.config.ts'
      - 'playwright.config.ts'
  schedule:
    - cron: '0 2 * * *'  # Weekly test run

jobs:
  bdd-tests:
    name: BDD Tier Isolation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run BDD Tests
        run: |
          if command -v npx &> /dev/null; then
            npx @cucumber/cucumber run tests/bdd/tier-isolation.feature
          else
            echo "Cucumber not installed - skipping BDD tests"
          fi

  vitest-tests:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install vitest @vitest/coverage-v8

      - name: Run Vitest
        run: npx vitest run --reporter=json

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: coverage/

  playwright-tests:
    name: Playwright Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npm install @playwright/test && npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test

  cargo-tests:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo tests
        run: cargo test --workspace

  vm-tier-tests:
    name: VM Tier Isolation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tier: [wasm, gvisor, microvm]
    steps:
      - uses: actions/checkout@v4

      - name: Test ${{ matrix.tier }} isolation
        run: |
          echo "Testing ${{ matrix.tier }} isolation tier"
          cargo test --test tier_isolation_${{ matrix.tier }}
