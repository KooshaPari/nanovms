# Qodo AI Test Configuration for NanoVMS
# https://www.qodo.ai

project:
  name: nanovms
  language: rust
  framework: cargo-test

agents:
  # Test Generation Agent
  test_generator:
    enabled: true
    patterns:
      - "src/**/*.rs"
      - "crates/*/src/**/*.rs"
    exclude:
      - "**/target/**"
      - "**/*.md"
    strategy: test-first
    coverage_target: 80
    
  # Security Analysis Agent  
  security_analyzer:
    enabled: true
    patterns:
      - "internal/adapters/**/*.rs"
      - "internal/domain/**/*.rs"
    checks:
      - unsafe_code
      - syscall_usage
      - memory_safety
      
  # Code Review Agent
  code_reviewer:
    enabled: true
    patterns:
      - "**/*.rs"
    checks:
      - idiomacy
      - performance
      - error_handling

test_patterns:
  # BDD-style tests
  bdd:
    directory: tests/bdd
    pattern: "*.feature"
    runner: cucumber-rust
    
  # Unit tests  
  unit:
    directory: tests/unit
    pattern: "*.rs"
    runner: cargo test
    
  # Integration tests with Playwright MCP
  integration:
    directory: tests/playwright
    pattern: "*.spec.ts"
    runner: playwright
    mcp_server: http://localhost:3001

# Tier-specific test generation
tier_tests:
  wasm:
    templates:
      - test_wasm_startup_time
      - test_wasm_memory_limits
      - test_wasi_syscalls
    
  gvisor:
    templates:
      - test_gvisor_sentry_isolation
      - test_seccomp_filtering
      - test_network_namespace
      
  microvm:
    templates:
      - test_firecracker_boot_time
      - test_kvm_isolation
      - test_oci_compatibility

# Custom test generation rules
rules:
  - name: adapter_test_required
    description: Every adapter must have comprehensive tests
    pattern: "internal/adapters/*/"
    required_tests:
      - "test_create_vm"
      - "test_start_vm"
      - "test_stop_vm"
      - "test_delete_vm"
      - "test_exec_command"
      
  - name: sandbox_isolation_tests
    description: Every sandbox type needs isolation verification
    pattern: "internal/adapters/sandbox/"
    required_tests:
      - "test_process_isolation"
      - "test_filesystem_isolation"
      - "test_network_isolation"

# Coverage thresholds
coverage:
  unit: 80
  integration: 70
  overall: 75

# Self-healing test configuration
self_healing:
  enabled: true
  triggers:
    - test_failure_rate > 0.3
    - compilation_error_in_test
  actions:
    - regenerate_test
    - update_assertions
    - fix_imports

# AI-generated test documentation
documentation:
  generate_from_tests: true
  format: markdown
  output_dir: docs/testing
  include:
    - test_purpose
    - edge_cases_covered
    - performance_characteristics
