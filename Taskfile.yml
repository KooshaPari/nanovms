version: '3'

vars:
  PROJECT_LANGUAGES:
    sh: |
      languages=""
      if [ -f go.mod ]; then
        languages="${languages}go "
      fi
      if [ -f package.json ]; then
        languages="${languages}node "
      fi
      if [ -n "$languages" ]; then
        printf "%s" "$languages" | sed 's/[[:space:]]*$//'
      else
        printf unknown
      fi
  NODE_PM:
    sh: |
      if [ -f bun.lockb ] || [ -f bun.lock ]; then
        printf bun
      elif [ -f pnpm-lock.yaml ]; then
        printf pnpm
      elif [ -f yarn.lock ]; then
        printf yarn
      else
        printf npm
      fi
  HAS_DOCS_BUILD:
    sh: |
      if [ -f package.json ] && grep -q '"docs:build"' package.json; then
        printf true
      else
        printf false
      fi
  HAS_NODE_TEST:
    sh: |
      if [ -f package.json ] && grep -q '"test"' package.json; then
        printf true
      else
        printf false
      fi
  HAS_NODE_LINT:
    sh: |
      if [ -f package.json ] && grep -q '"lint"' package.json; then
        printf true
      else
        printf false
      fi

tasks:
  default:
    desc: Show available tasks and detected project languages.
    cmds:
      - task --list
      - 'echo "detected languages: {{.PROJECT_LANGUAGES}}"'

  build:
    desc: Build Go packages and optional docs assets.
    cmds:
      - |
        if [ -f go.mod ]; then
          go build ./...
        fi
        if [ "{{.HAS_DOCS_BUILD}}" = "true" ]; then
          {{.NODE_PM}} run docs:build
        fi

  test:
    desc: Run Go tests and optional Node test script.
    cmds:
      - |
        if [ -f go.mod ]; then
          go test ./...
        fi
        if [ "{{.HAS_NODE_TEST}}" = "true" ]; then
          {{.NODE_PM}} test
        fi

  lint:
    desc: Run Go formatting/vet checks and optional Node lint script.
    cmds:
      - |
        if [ -f go.mod ]; then
          test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"
          go vet ./...
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint run ./...
          else
            echo "golangci-lint not installed; skipping"
          fi
        fi
        if [ "{{.HAS_NODE_LINT}}" = "true" ]; then
          {{.NODE_PM}} run lint
        fi

  clean:
    desc: Remove build outputs and test caches.
    cmds:
      - |
        if [ -f go.mod ]; then
          go clean -cache -testcache || echo "go clean cache cleanup skipped"
          find . \( -name coverage.out -o -name coverage.html -o -name coverage.xml -o -name test-output.json -o -name unit-tests.xml \) -type f -delete
        fi
        if [ -f package.json ]; then
          rm -rf node_modules docs/.vitepress/dist dist build coverage
        fi
