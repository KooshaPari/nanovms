version: '3'

vars:
  GO_PACKAGE_DIRS:
    sh: |
      find cmd internal -type f -name '*.go' -not -path '*/vendor/*' -exec dirname {} \; 2>/dev/null | sort -u | tr '\n' ' '
  GO_PACKAGES:
    sh: |
      for dir in {{.GO_PACKAGE_DIRS}}; do
        go list "./${dir}" 2>/dev/null || true
      done | tr '\n' ' '
  PROJECT_LANG:
    sh: |
      if [ -f go.mod ]; then
        printf go
      elif [ -f package.json ]; then
        printf node
      else
        printf unknown
      fi
  NODE_PM:
    sh: |
      if [ -f bun.lockb ] || [ -f bun.lock ]; then
        printf bun
      elif [ -f pnpm-lock.yaml ]; then
        printf pnpm
      elif [ -f yarn.lock ]; then
        printf yarn
      else
        printf npm
      fi

tasks:
  build:
    desc: Build the project for the detected language.
    cmds:
      - |
        case "{{.PROJECT_LANG}}" in
          go)
            go build {{.GO_PACKAGES}}
            ;;
          node)
            {{.NODE_PM}} run build
            ;;
          *)
            echo "unsupported project language: {{.PROJECT_LANG}}" >&2
            exit 1
            ;;
        esac

  test:
    desc: Run the project test suite.
    cmds:
      - |
        case "{{.PROJECT_LANG}}" in
          go)
            go test {{.GO_PACKAGES}}
            ;;
          node)
            {{.NODE_PM}} test
            ;;
          *)
            echo "unsupported project language: {{.PROJECT_LANG}}" >&2
            exit 1
            ;;
        esac

  lint:
    desc: Run the project lint checks.
    cmds:
      - |
        case "{{.PROJECT_LANG}}" in
          go)
            go vet {{.GO_PACKAGES}}
            if command -v golangci-lint >/dev/null 2>&1; then
              golangci-lint run {{.GO_PACKAGES}}
            else
              echo "golangci-lint not installed; skipping"
            fi
            ;;
          node)
            {{.NODE_PM}} run lint
            ;;
          *)
            echo "unsupported project language: {{.PROJECT_LANG}}" >&2
            exit 1
            ;;
        esac

  clean:
    desc: Remove build and test caches for the detected language.
    cmds:
      - |
        case "{{.PROJECT_LANG}}" in
          go)
            go clean -cache -testcache || go clean -testcache
            find . -name coverage.out -o -name coverage.html -o -name coverage.xml -o -name test-output.json -o -name unit-tests.xml | xargs rm -f
            ;;
          node)
            rm -rf node_modules .turbo .vitepress/dist dist build coverage
            ;;
          *)
            echo "unsupported project language: {{.PROJECT_LANG}}" >&2
            exit 1
            ;;
        esac
